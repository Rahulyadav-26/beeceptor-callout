name: 🧪 Beeceptor HTTP Callout Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC (11:30 AM IST) — catches regressions from Beeceptor updates
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright (Chromium only — faster CI)
        run: npx playwright install --with-deps chromium

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🧪 Run Playwright Tests
        run: npx playwright test
        env:
          CI: 'true'
          MAIN_ENDPOINT_NAME: ${{ secrets.MAIN_ENDPOINT_NAME }}
          RECEIVER_ENDPOINT_NAME: ${{ secrets.RECEIVER_ENDPOINT_NAME }}

      - name: 📊 Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()  # Upload even on test failure
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: 📋 Upload Test Results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: 🚀 Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_number }}

      - name: 🔗 Comment Report URL on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const runNumber = context.runNumber;
            const repoUrl = `https://Rahulyadav-26.github.io/beeceptor-callout/reports/${runNumber}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Report\n📊 [View Playwright Report](${repoUrl})\n\n_Run #${runNumber}_`
            });
